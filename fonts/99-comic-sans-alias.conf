<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  Map "Comic Sans MS" (Microsoft proprietary, not bundled in slim Debian) to
  "Comic Neue" (free OFL-licensed Comic Sans look-alike, bundled in fonts/).

  Strong binding ensures the substitution wins over fontconfig's default
  fallback, so API requests with font_name="Comic Sans MS" render as Comic
  Neue on the server instead of an unrelated default sans.
-->
<fontconfig>
  <alias binding="strong">
    <family>Comic Sans MS</family>
    <prefer>
      <family>Comic Neue</family>
    </prefer>
  </alias>
  <alias binding="strong">
    <family>Comic Sans</family>
    <prefer>
      <family>Comic Neue</family>
    </prefer>
  </alias>
</fontconfig>
